apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: golden-path-alerts
  labels:
    app.kubernetes.io/part-of: observability-golden-path
    release: kube-prometheus-stack
spec:
  groups:
    - name: golden-path.alerts
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Node {{ $labels.node }} is not Ready"
            description: "Kubernetes reports node {{ $labels.node }} as not Ready for more than 5 minutes."
            impact: "Pods may be evicted or unavailable, and cluster capacity is reduced."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-cluster-overview"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/NodeNotReady.md"
        - alert: WorkloadUnavailable
          expr: |
            (kube_deployment_status_replicas_available < kube_deployment_spec_replicas)
            or
            (kube_statefulset_status_replicas_ready < kube_statefulset_replicas)
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Workload {{ $labels.namespace }}/{{ $labels.deployment }}{{ $labels.statefulset }} is unavailable"
            description: "Available or ready replicas are below desired replicas for more than 10 minutes."
            impact: "User traffic may fail or run with reduced redundancy."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-workload-reliability"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/WorkloadUnavailable.md"
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
          for: 5m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting"
            description: "Container {{ $labels.container }} restarted more than three times in 10 minutes."
            impact: "The workload may be unable to serve requests or complete jobs."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-workload-reliability"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/PodCrashLooping.md"
        - alert: ContainerOOMKilled
          expr: increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} was OOMKilled"
            description: "Kubernetes recorded an OOMKilled termination in the last 15 minutes."
            impact: "The container lost in-memory state and may restart repeatedly."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-workload-reliability"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/ContainerOOMKilled.md"
        - alert: PodStuckPending
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is stuck Pending"
            description: "The pod has remained Pending for more than 15 minutes."
            impact: "The workload cannot start and desired capacity is missing."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-cluster-overview"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/PodStuckPending.md"
        - alert: PersistentVolumeAlmostFull
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Persistent volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is almost full"
            description: "PVC usage has stayed above 85 percent for more than 10 minutes."
            impact: "Applications may fail writes or corrupt work if the volume fills."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-capacity-and-efficiency"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/PersistentVolumeAlmostFull.md"
        - alert: PrometheusTargetDown
          expr: up == 0
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} is down"
            description: "Prometheus has not scraped this target successfully for more than 10 minutes."
            impact: "Metrics and alerts for this component may be missing."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-observability-stack-health"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/PrometheusTargetDown.md"
        - alert: LokiIngestionFailing
          expr: rate(loki_request_duration_seconds_count{route=~".*push.*",status_code=~"5.."}[5m]) > 0
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Loki ingestion requests are failing"
            description: "Loki push endpoints are returning 5xx responses for more than 10 minutes."
            impact: "Application logs and Kubernetes Events may be missing from Loki."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-observability-stack-health"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/LokiIngestionFailing.md"
        - alert: LokiDiscardingLogs
          expr: rate(loki_discarded_samples_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Loki is discarding log samples"
            description: "Loki discarded log samples for more than 10 minutes."
            impact: "Some logs or Kubernetes Events are not searchable in Grafana."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-observability-stack-health"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/LokiDiscardingLogs.md"
        - alert: FluentBitDroppingLogs
          expr: rate(fluentbit_output_dropped_records_total[5m]) > 0
          for: 10m
          labels:
            severity: warning
            cluster: __CLUSTER__
            environment: __ENVIRONMENT__
          annotations:
            summary: "Fluent Bit is dropping log records"
            description: "Fluent Bit dropped output records for more than 10 minutes."
            impact: "Container logs or Kubernetes Events may be missing from Loki."
            dashboard_url: "http://kube-prometheus-stack-grafana.observability.svc.cluster.local/d/golden-path-observability-stack-health"
            runbook_url: "https://github.com/mstrugarevic1/k8s-examples/blob/main/k8s-observability-golden-path/runbooks/FluentBitDroppingLogs.md"

