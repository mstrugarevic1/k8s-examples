apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crashloop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crashloop
        app: crashloop
    spec:
      containers:
        - name: crashloop
          image: busybox:1.36
          command: ["sh", "-c", "echo '{\"level\":\"error\",\"message\":\"controlled crash\"}'; exit 1"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
