apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-failure
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: readiness-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: readiness-failure
  template:
    metadata:
      labels:
        app.kubernetes.io/name: readiness-failure
        app: readiness-failure
    spec:
      containers:
        - name: web
          image: nginx:1.29-alpine
          readinessProbe:
            httpGet:
              path: /not-ready
              port: 80
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
