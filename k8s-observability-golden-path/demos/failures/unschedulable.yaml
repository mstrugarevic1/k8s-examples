apiVersion: v1
kind: Pod
metadata:
  name: unschedulable-node-selector
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: unschedulable-node-selector
    app: unschedulable-node-selector
spec:
  nodeSelector:
    golden-path.example.com/nonexistent-node: "true"
  containers:
    - name: pause
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
