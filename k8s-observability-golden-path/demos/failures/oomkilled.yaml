apiVersion: v1
kind: Pod
metadata:
  name: oomkilled
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: oomkilled
    app: oomkilled
spec:
  restartPolicy: Always
  containers:
    - name: oomkilled
      image: python:3.13-alpine
      command: ["python", "-c", "x=[]\nwhile True: x.append('x'*1024*1024)"]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
