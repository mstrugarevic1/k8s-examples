apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-path-api
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: golden-path-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: golden-path-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-path-api
        app: golden-path-api
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8080"
            - "-text={\"level\":\"info\",\"service\":\"golden-path-api\",\"message\":\"demo response\"}"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: golden-path-api
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: golden-path-api
spec:
  selector:
    app.kubernetes.io/name: golden-path-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: golden-path-traffic
  namespace: golden-path-demo
  labels:
    app.kubernetes.io/name: golden-path-traffic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: golden-path-traffic
  template:
    metadata:
      labels:
        app.kubernetes.io/name: golden-path-traffic
        app: golden-path-traffic
    spec:
      containers:
        - name: traffic
          image: curlimages/curl:8.16.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                curl -fsS http://golden-path-api.golden-path-demo.svc.cluster.local/ >/dev/null && echo '{"level":"info","service":"golden-path-traffic","message":"request ok"}' || echo '{"level":"error","service":"golden-path-traffic","message":"request failed"}'
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
