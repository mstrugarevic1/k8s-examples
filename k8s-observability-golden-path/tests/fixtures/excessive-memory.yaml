apiVersion: apps/v1
kind: Deployment
metadata:
  name: excessive-memory
  namespace: observability-fixtures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: excessive-memory
  template:
    metadata:
      labels:
        app: excessive-memory
    spec:
      containers:
        - name: excessive-memory
          image: python:3.12-alpine
          command: ["python", "-c", "x=[]\nwhile True: x.append('x'*1024*1024)"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

