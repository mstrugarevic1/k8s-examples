apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-failing
  namespace: observability-fixtures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: readiness-failing
  template:
    metadata:
      labels:
        app: readiness-failing
    spec:
      containers:
        - name: readiness-failing
          image: nginx:1.27-alpine
          readinessProbe:
            httpGet:
              path: /not-ready
              port: 80
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

