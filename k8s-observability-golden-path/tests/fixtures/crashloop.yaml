apiVersion: v1
kind: Namespace
metadata:
  name: observability-fixtures
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop
  namespace: observability-fixtures
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop
  template:
    metadata:
      labels:
        app: crashloop
    spec:
      containers:
        - name: crashloop
          image: busybox:1.36
          command: ["sh", "-c", "echo fixture error: crashing; exit 1"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi

