loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: "${LOKI_S3_BUCKET}"
      ruler: "${LOKI_S3_BUCKET}"
      admin: "${LOKI_S3_BUCKET}"
    s3:
      region: "${LOKI_S3_REGION}"
      endpoint: "${LOKI_S3_ENDPOINT}"
      s3ForcePathStyle: true
  limits_config:
    retention_period: 15d
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_parallelism: 32
    split_queries_by_interval: 15m
  compactor:
    retention_enabled: true
    delete_request_store: s3

deploymentMode: Distributed

singleBinary:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  maxUnavailable: 1

distributor:
  replicas: 2
  maxUnavailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

ingester:
  replicas: 3
  maxUnavailable: 1
  zoneAwareReplication:
    enabled: false
  persistence:
    enabled: true
    claims:
      - name: data
        size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 2Gi

querier:
  replicas: 2
  maxUnavailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

queryFrontend:
  replicas: 2
  maxUnavailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

queryScheduler:
  replicas: 2
  maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

indexGateway:
  replicas: 2
  maxUnavailable: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

compactor:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

chunksCache:
  enabled: true
resultsCache:
  enabled: true
test:
  enabled: false

