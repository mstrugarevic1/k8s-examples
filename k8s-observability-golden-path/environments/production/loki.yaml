loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: "${LOKI_S3_BUCKET}"
      ruler: "${LOKI_S3_BUCKET}"
      admin: "${LOKI_S3_BUCKET}"
    s3:
      region: "${LOKI_S3_REGION}"
      endpoint: "${LOKI_S3_ENDPOINT}"
      s3ForcePathStyle: true
  limits_config:
    retention_period: 15d
deploymentMode: Distributed
gateway:
  enabled: true
  replicas: 2
  podDisruptionBudget:
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: gateway
read:
  replicas: 2
  podDisruptionBudget:
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: read
write:
  replicas: 3
  podDisruptionBudget:
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: write
backend:
  replicas: 3
  podDisruptionBudget:
    maxUnavailable: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: backend
singleBinary:
  replicas: 0
chunksCache:
  enabled: true
resultsCache:
  enabled: true
test:
  enabled: false
