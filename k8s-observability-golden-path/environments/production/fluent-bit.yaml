kind: DaemonSet
serviceMonitor:
  enabled: true
  namespace: observability
podLabels:
  app.kubernetes.io/part-of: observability-golden-path
config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_kube.db
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
  outputs: |
    [OUTPUT]
        Name                  loki
        Match                 kube.*
        Host                  loki-gateway.observability.svc.cluster.local
        Port                  80
        Labels                cluster=production,environment=production,namespace=$kubernetes['namespace_name'],workload=$kubernetes['labels']['app'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name']
        Retry_Limit           False
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
tolerations:
  - operator: Exists
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: fluent-bit
