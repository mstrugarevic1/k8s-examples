alertmanager:
  config:
    route:
      receiver: slack-platform
      group_by: ["alertname", "namespace", "workload"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: slack-platform
        slack_configs:
          - api_url: "<slack-webhook-url>"
            channel: "#platform-alerts"
            send_resolved: true
            title: "{{ .CommonLabels.alertname }}"
            text: "{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"

