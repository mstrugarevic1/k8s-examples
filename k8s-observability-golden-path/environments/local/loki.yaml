loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 24h
    reject_old_samples: true
    reject_old_samples_max_age: 24h
    max_query_parallelism: 8
    split_queries_by_interval: 15m
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
gateway:
  enabled: true
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
