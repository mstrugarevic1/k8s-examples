defaultRules:
  create: true

grafana:
  replicas: 1
  persistence:
    enabled: false
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 384Mi

prometheus:
  prometheusSpec:
    replicas: 1
    resources:
      requests:
        cpu: 150m
        memory: 768Mi
      limits:
        memory: 1536Mi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "workload"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "null"
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 96Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
