defaultRules:
  enabled: true

vmsingle:
  spec:
    replicaCount: 1
    resources:
      requests:
        cpu: 150m
        memory: 768Mi
      limits:
        memory: 1536Mi

vmagent:
  spec:
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        memory: 384Mi

vmalert:
  spec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "workload"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "null"
  spec:
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 96Mi

grafana:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 384Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
