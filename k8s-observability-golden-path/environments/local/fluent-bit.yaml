kind: DaemonSet
serviceMonitor:
  enabled: true
  namespace: observability
podLabels:
  app.kubernetes.io/part-of: observability-golden-path
config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
  outputs: |
    [OUTPUT]
        Name                  loki
        Match                 kube.*
        Host                  loki-gateway.observability.svc.cluster.local
        Port                  80
        Labels                cluster=local,environment=local,namespace=$kubernetes['namespace_name'],workload=$kubernetes['labels']['app'],pod=$kubernetes['pod_name'],container=$kubernetes['container_name']
        Retry_Limit           10
resources:
  requests:
    cpu: 25m
    memory: 64Mi
