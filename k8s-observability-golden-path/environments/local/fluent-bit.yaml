kind: DaemonSet
rbac:
  create: true
  eventsAccess: true
service:
  port: 2020
podLabels:
  app.kubernetes.io/part-of: observability-golden-path
config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        storage.path  /var/log/flb-storage
        storage.sync  normal
        storage.checksum off
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        DB                /var/log/flb_kube.db
        storage.type      filesystem

    [INPUT]
        Name              kubernetes_events
        Tag               kube.events
        Interval_Sec      10
        Kube_URL          https://kubernetes.default.svc
        Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.var.log.containers.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On

    [FILTER]
        Name                lua
        Match               kube.var.log.containers.*
        script              /fluent-bit/scripts/labels.lua
        call                container_labels

    [FILTER]
        Name                lua
        Match               kube.events
        script              /fluent-bit/scripts/labels.lua
        call                event_labels
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
