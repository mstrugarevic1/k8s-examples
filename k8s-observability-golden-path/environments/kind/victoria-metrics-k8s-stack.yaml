defaultRules:
  enabled: true
  groups:
    # Kind runs etcd, kube-scheduler, and kube-controller-manager bound to
    # 127.0.0.1, so their scrape targets and Down alerts can never work.
    etcd:
      enabled: false
    kube-scheduler.rules:
      enabled: false
    kubernetes-system-scheduler:
      enabled: false
    kubernetes-system-controller-manager:
      enabled: false

kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false

vmsingle:
  spec:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

vmagent:
  spec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

vmalert:
  spec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "workload"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: "null"
  spec:
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

grafana:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
