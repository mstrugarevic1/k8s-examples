loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 24h
    max_query_parallelism: 4
    split_queries_by_interval: 15m

deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 512Mi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true

chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
