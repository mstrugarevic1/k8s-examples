team: payments
environment: staging

namespace:
  name: payments-staging

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

quota:
  cpu: "4"
  memory: "8Gi"
  pods: 20

network:
  allowDns: true
  allowIngressFromSameNamespace: true

rbac:
  readOnlyGroup: payments-readers
  developerGroup: payments-developers
