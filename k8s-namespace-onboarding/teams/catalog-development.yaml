team: catalog
environment: development

namespace:
  name: catalog-development

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

quota:
  cpu: "2"
  memory: "4Gi"
  pods: 10

network:
  allowDns: true
  allowIngressFromSameNamespace: false

rbac:
  readOnlyGroup: catalog-readers
  developerGroup: catalog-developers
