apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8shostpath
spec:
  crd:
    spec:
      names:
        kind: K8sHostPath
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8shostpath

        violation[{"msg": msg}] {
          volume := input.review.object.spec.volumes[_]
          volume.hostPath
          msg := sprintf("hostPath volume <%v> nije dozvoljen", [volume.name])
        }
